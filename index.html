  <style>
    /* CSS変数定義 */
    :root {
      /* スペーシングスケール */
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;

      /* カラーパレット */
      --bg: #f5f7fb;
      --card: #fff;
      --muted: #697386;
      --border: #e6e8ef;
      --text: #0f172a;
      --primary: #007AFF;
      --primary-h: #0062D6;

      /* デザイン要素 */
      --radius: 14px;
      --shadow: 0 10px 28px rgba(16, 24, 40, .06);
      --shadow-hover: 0 14px 36px rgba(16, 24, 40, .10);
      --ring: 0 0 0 3px rgba(0, 122, 255, .17);
    }

    /* リセット */
    * {
      box-sizing: border-box;
    }

    /* 基本レイアウト */
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    main {
      max-width: 820px;
      margin: var(--space-8) auto;
      padding: 0 var(--space-4);
    }

    /* タイポグラフィ */
    h1 {
      margin: 0 0 var(--space-2);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .ruby-text {
      margin: 0 0 var(--space-2);
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .ruby-text ruby {
      font-size: 16px;
      font-weight: 600;
    }

    .lead {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      margin: 0 0 var(--space-6);
      font-size: 15px;
    }

    /* スペーシングユーティリティ */
    .stack > * + * {
      margin-top: var(--space-6);
    }

    .tight > * + * {
      margin-top: var(--space-3);
    }

    .loose > * + * {
      margin-top: var(--space-4);
    }

    /* カード */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--space-6);
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 var(--space-4);
      font-weight: 800;
      font-size: 16px;
      color: #0b1220;
    }

    /* ソーシャルプロバイダー */
    .provider-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
    }

    @media (max-width: 560px) {
      .provider-row {
        grid-template-columns: 1fr;
      }
    }

    .provider-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      box-shadow: var(--shadow);
      transition: transform .06s, box-shadow .12s, background .12s, border-color .12s;
    }

    .provider-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
      background: #fbfcfe;
    }

    .provider-btn:active {
      transform: translateY(0);
    }

    .provider-btn:focus-visible {
      outline: none;
      box-shadow: var(--ring), var(--shadow-hover);
    }

    .apple {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .apple:hover {
      background: #000;
    }

    /* メールフォーム */
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      min-height: 48px;
    }

    .input-row input {
      border: 0;
      outline: none;
      width: 100%;
      font-size: 16px;
      background: transparent;
    }

    .btn {
      padding: 14px 16px;
      min-height: 48px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: var(--shadow);
      width: 100%;
      transition: transform .06s, box-shadow .12s, background .12s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
      background: var(--primary-h);
    }

    .btn:active {
      transform: translateY(0);
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    /* フォームメッセージ */
    .msg {
      margin-top: var(--space-3);
      padding: 10px 12px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #b91c1c; /* 赤系で注意喚起 */
      display: none;
      gap: 8px;
      align-items: flex-start;
      box-shadow: var(--shadow);
      font-size: 13px;
    }

    .msg.show {
      display: flex;
    }

    /* サインイン状態のブロック（デフォルトで非表示） */
    #signed-in {
      display: none;
    }
  </style>

    const $ = (s) => document.querySelector(s);

    /**
     * 指定IDのメッセージ表示/クリア
     */
    function showMsg(targetId, html) {
      const el = document.getElementById(targetId);
      if (!el) return;
      el.innerHTML = html;
      el.classList.add("show");
    }

    function clearMsg(targetId) {
      const el = document.getElementById(targetId);
      if (!el) return;
      el.classList.remove("show");
      el.innerHTML = "";
    }

    // Firebaseエラーコード→多言語
    function translateError(code) {
      switch (code) {
        case "auth/email-already-in-use": return t("このメールアドレスは既に登録されています。");
        case "auth/invalid-email": return t("メールアドレスの形式が正しくありません。");
        case "auth/weak-password": return t("パスワードは6文字以上にしてください。");
        case "auth/user-not-found": return t("このメールアドレスは登録されていません。");
        case "auth/wrong-password": return t("パスワードが正しくありません。");
        case "auth/popup-closed-by-user": return t("ログイン画面が閉じられました。もう一度お試しください。");
        case "auth/network-request-failed": return t("ネットワークエラーが発生しました。接続を確認してください。");
        case "auth/too-many-requests": return t("試行回数が多すぎます。しばらく待ってから再度お試しください。");
        default: return t("エラーが発生しました。もう一度お試しください。");
      }
    }

    // 保険：app.php 側のログアウトを検知
    if (document.cookie.includes("php_logged_out=")) {
      try { await signOut(auth); } catch(e) {}
      document.cookie = "php_logged_out=; Max-Age=0; path=/";
    }

    // サインイン状態の監視
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // ユーザー情報を追跡
        fetch('track_user', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            uid: user.uid,
            email: user.email || '',
            displayName: user.displayName || '',
            provider: user.providerData?.[0]?.providerId || '',
            createdAt: user.metadata?.creationTime || ''
          })
        }).catch(() => {});
        window.location.href = "app";
      } else {
        // 表示切替
        document.getElementById("signed-out").style.display = "block";
        document.getElementById("signed-in").style.display  = "none";
      }
    });

    // --- メール新規登録 ---
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault(); clearMsg("signup-msg");
      const email = document.getElementById("su-email").value.trim();
      const pass  = document.getElementById("su-pass").value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        showMsg("signup-msg", '<i class="fa-solid fa-circle-check"></i> ' + t('登録できました。'));
      } catch (err) {
        showMsg("signup-msg", `<i class="fa-solid fa-circle-exclamation"></i> ${translateError(err.code)}`);
      }
    });

    // --- メールログイン ---
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault(); clearMsg("login-msg");
      const email = document.getElementById("li-email").value.trim();
      const pass  = document.getElementById("li-pass").value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        showMsg("login-msg", '<i class="fa-solid fa-circle-check"></i> ' + t('ログイン成功。'));
      } catch (err) {
        showMsg("login-msg", `<i class="fa-solid fa-circle-exclamation"></i> ${translateError(err.code)}`);
      }
    });

    // --- Googleログイン ---
    const googleProvider = new GoogleAuthProvider();
    googleProvider.setCustomParameters({ prompt: "select_account" });
    async function googleLogin() {
      clearMsg("login-msg");
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (err) {
        if (err?.code === "auth/popup-blocked" || err?.code === "auth/popup-closed-by-user") {
          await signInWithRedirect(auth, googleProvider);
          return;
        }
        showMsg("login-msg", `<i class="fa-solid fa-circle-exclamation"></i> ${translateError(err.code)}`);
      }
    }
    document.getElementById("google-btn").addEventListener("click", googleLogin);

    // --- Appleログイン ---
    const appleProvider = new OAuthProvider('apple.com');
    appleProvider.addScope('email');
    appleProvider.addScope('name');
    async function appleLogin() {
      clearMsg("login-msg");
      try {
        await signInWithPopup(auth, appleProvider);
      } catch (err) {
        if (err?.code === "auth/popup-blocked" || err?.code === "auth/popup-closed-by-user") {
          await signInWithRedirect(auth, appleProvider);
          return;
        }
        showMsg("login-msg", `<i class="fa-solid fa-circle-exclamation"></i> ${translateError(err.code)}`);
      }
    }
    document.getElementById("apple-btn").addEventListener("click", appleLogin);

    // --- ログアウト（手動）---
    document.getElementById("logout-btn").addEventListener("click", async () => {
      clearMsg("login-msg"); clearMsg("signup-msg");
      await signOut(auth);
    });
  </script>
</head>
<body>
  <main class="stack">
    <header>
      <h1><i class="fa-solid fa-robot"></i> denwa2.com</h1>
      <p class="lead"><i class="fa-solid fa-phone-volume"></i> AIが電話をかけて営業状況や営業時間を確認したり、予約をとったりします。</p>
    </header>

    <!-- サインアウト状態のビュー -->
    <section id="signed-out" class="stack" style="display:none">
      <!-- Social Login -->
      <div class="card">
        <h2 class="section-title"><i class="fa-solid fa-right-to-bracket"></i> ソーシャルでログイン</h2>
        <div class="provider-row">
          <button id="google-btn" class="provider-btn">
            <i class="fa-brands fa-google"></i> Googleでログイン
          </button>
          <button id="apple-btn" class="provider-btn apple">
            <i class="fa-brands fa-apple"></i> Appleでログイン
          </button>
        </div>
      </div>

      <!-- Email Signup -->
      <div class="card">
        <h2 class="section-title"><i class="fa-solid fa-user-plus"></i> 新規登録（メール）</h2>
        <form id="signup-form" class="loose" autocomplete="on">
          <div class="input-row">
            <i class="fa-solid fa-envelope"></i>
            <input id="su-email" type="email" placeholder="メールアドレス" required />
          </div>
          <div class="input-row">
            <i class="fa-solid fa-lock"></i>
            <input id="su-pass" type="password" placeholder="パスワード（6文字以上）" required />
          </div>
          <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> 登録する</button>
          <!-- 登録ボタン直下のメッセージ -->
          <div id="signup-msg" class="msg" role="status" aria-live="polite"></div>
        </form>
      </div>

      <!-- Email Login -->
      <div class="card">
        <h2 class="section-title"><i class="fa-solid fa-arrow-right-to-bracket"></i> ログイン（メール）</h2>
        <form id="login-form" class="loose" autocomplete="on">
          <div class="input-row">
            <i class="fa-solid fa-envelope"></i>
            <input id="li-email" type="email" placeholder="メールアドレス" required />
          </div>
          <div class="input-row">
            <i class="fa-solid fa-lock"></i>
            <input id="li-pass" type="password" placeholder="パスワード" required />
          </div>
          <button type="submit" class="btn"><i class="fa-solid fa-right-to-bracket"></i> ログイン</button>
          <!-- ログインボタン直下のメッセージ -->
          <div id="login-msg" class="msg" role="status" aria-live="polite"></div>
        </form>
      </div>
    </section>

    <!-- サインイン状態のビュー -->
    <section id="signed-in" class="card">
      <h2 class="section-title"><i class="fa-solid fa-circle-user"></i> ログイン中</h2>
      <p class="muted">この画面は稀に表示されることがありますが、通常は自動でアプリ画面へ遷移します。</p>
      <button id="logout-btn" class="btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> ログアウト</button>
    </section>
  </main>
</body>
</html>
